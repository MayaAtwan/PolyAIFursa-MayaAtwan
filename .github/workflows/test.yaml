name: Tests

on:
  push:
    branches:
      - "feature/*"
      - main
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt

      - name: Run tests with coverage
        run: pytest tests/
        working-directory: services/yolo

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: yolo
          fail_ci_if_error: true

  test-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r services/agent/requirements.txt

      - name: Run agent tests with coverage
        run: pytest tests/
        working-directory: services/agent

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: agent
          fail_ci_if_error: true

