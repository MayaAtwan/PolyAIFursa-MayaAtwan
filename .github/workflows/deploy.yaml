name: Deploy Yolo

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            cd ~/PolyAIFursa-MayaAtwan
            git pull origin dev
            source services/yolo/venv/bin/activate
            pip install -r services/yolo/requirements.txt
            sudo systemctl restart yolo.service
            sleep 5
            sudo systemctl is-active --quiet yolo.service && echo "Service is running" || (echo "Service failed" && exit 1)

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Prod instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.PROD_INSTANCE_SSH_KEY }}
          script: |
            cd ~/PolyAIFursa-MayaAtwan
            git pull origin main
            source services/yolo/venv/bin/activate
            pip install -r services/yolo/requirements.txt
            sudo systemctl restart yolo.service
            sleep 5
            sudo systemctl is-active --quiet yolo.service && echo "Service is running" || (echo "Service failed" && exit 1)